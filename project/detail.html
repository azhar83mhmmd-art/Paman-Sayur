<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Produk - MiniSayur Market</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#4caf50"/><path d="M12 6v6l4 2" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      <span>MiniSayur</span>
    </a>
    <div class="nav-right">
      <button class="icon-btn" id="dark-toggle" onclick="DarkMode.toggle()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
      <a href="checkout.html" class="icon-btn" title="Keranjang">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61l1.64-8.39H4"/></svg>
        <span class="cart-badge" style="display:none">0</span>
      </a>
      <div id="user-section"></div>
    </div>
  </div>
</nav>

<main class="container">
  <!-- Breadcrumb -->
  <nav class="breadcrumb" aria-label="breadcrumb">
    <a href="index.html">Beranda</a>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    <a href="produk.html">Produk</a>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    <span id="bc-nama">Detail</span>
  </nav>

  <div class="detail-layout" id="detail-content">
    <!-- Loading skeleton -->
    <div class="detail-img-wrap">
      <div class="skeleton" style="width:100%;height:400px;border-radius:16px;"></div>
    </div>
    <div class="detail-info">
      <div class="skeleton skeleton-line" style="height:32px;width:70%;margin-bottom:16px;"></div>
      <div class="skeleton skeleton-line" style="height:20px;width:40%;margin-bottom:24px;"></div>
      <div class="skeleton skeleton-line" style="height:48px;width:50%;margin-bottom:24px;"></div>
    </div>
  </div>
</main>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/realtime.js"></script>
<script>
  let currentProduct = null;
  let selectedQty = 1;

  async function loadDetail() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) { window.location.href = 'produk.html'; return; }

    const { data, error } = await db.from('products').select('*').eq('id', id).single();
    if (error || !data) { window.location.href = 'produk.html'; return; }

    currentProduct = data;
    document.title = `${data.nama} - MiniSayur Market`;
    document.getElementById('bc-nama').textContent = data.nama;

    renderDetail(data);

    // Realtime stok
    Realtime.subscribeProducts((payload) => {
      if (payload.new?.id === id || payload.old?.id === id) {
        const updated = payload.new || payload.old;
        currentProduct = { ...currentProduct, ...updated };
        updateStokDisplay(updated.stok);
      }
    });
  }

  function renderDetail(p) {
    const habis = p.stok <= 0;
    const imgSrc = p.image_url || `https://placehold.co/500x500/e8f5e9/2e7d32?text=${encodeURIComponent(p.nama)}`;

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-img-wrap">
        <img src="${imgSrc}" alt="${p.nama}" class="detail-img" onerror="this.src='https://placehold.co/500x500/e8f5e9/2e7d32?text=Foto'">
        ${habis ? '<div class="habis-overlay"><span>Stok Habis</span></div>' : ''}
      </div>
      <div class="detail-info">
        <span class="detail-kategori">${p.kategori}</span>
        <h1 class="detail-nama">${p.nama}</h1>
        <div class="detail-harga">${Fmt.currency(p.harga)}</div>
        
        <div class="detail-stok-info" id="stok-display">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${habis ? '#e53e3e' : '#2e7d32'}" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span style="color: ${habis ? '#e53e3e' : '#2e7d32'}">
            ${habis ? 'Stok Habis' : `Stok tersedia: ${p.stok}`}
          </span>
        </div>

        ${p.deskripsi ? `<div class="detail-desc"><h3>Deskripsi</h3><p>${p.deskripsi}</p></div>` : ''}

        ${!habis ? `
        <div class="qty-wrapper">
          <label>Jumlah:</label>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(-1)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <span id="qty-display">1</span>
            <button class="qty-btn" onclick="changeQty(1)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>
        ` : ''}

        <div class="detail-actions">
          <button class="btn-keranjang-detail ${habis ? 'disabled' : ''}" 
                  onclick="${habis ? '' : 'addToCartDetail()'}" ${habis ? 'disabled' : ''}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61l1.64-8.39H4"/></svg>
            ${habis ? 'Stok Habis' : 'Tambah ke Keranjang'}
          </button>
          <a href="checkout.html" class="btn-beli-sekarang ${habis ? 'disabled' : ''}" 
             onclick="${habis ? 'return false' : 'addToCartDetail()'}">
            Beli Sekarang
          </a>
        </div>

        <div class="detail-cod-info">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          Pembayaran dilakukan saat barang diterima (COD)
        </div>
      </div>
    `;
  }

  function changeQty(delta) {
    const newQty = selectedQty + delta;
    if (newQty < 1) return;
    if (newQty > currentProduct.stok) {
      Toast.show('Melebihi stok tersedia', 'warning');
      return;
    }
    selectedQty = newQty;
    document.getElementById('qty-display').textContent = selectedQty;
  }

  function addToCartDetail() {
    if (!Auth.isLoggedIn()) { Modal.showLogin(); return; }
    if (!currentProduct) return;
    Cart.add(currentProduct, selectedQty);
  }

  function updateStokDisplay(stok) {
    const el = document.getElementById('stok-display');
    if (!el) return;
    const habis = stok <= 0;
    el.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${habis ? '#e53e3e' : '#2e7d32'}" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span style="color: ${habis ? '#e53e3e' : '#2e7d32'}">${habis ? 'Stok Habis' : `Stok tersedia: ${stok}`}</span>
    `;
  }

  document.addEventListener('DOMContentLoaded', loadDetail);
</script>
</body>
</html>
