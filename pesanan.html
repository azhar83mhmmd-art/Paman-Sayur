<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesanan Saya - MiniSayur Market</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#4caf50"/><path d="M12 6v6l4 2" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      <span>MiniSayur</span>
    </a>
    <div class="nav-right">
      <a href="produk.html" class="icon-btn" title="Belanja">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      </a>
      <div id="user-section"></div>
    </div>
  </div>
</nav>

<main class="container">
  <!-- New order success banner -->
  <div id="new-order-banner" style="display:none" class="success-banner">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
    Pesanan berhasil dibuat! Kami akan segera memproses pesanan Anda.
  </div>

  <div class="page-header">
    <h1>Pesanan Saya</h1>
    <a href="produk.html" class="btn-outline-sm">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Belanja Lagi
    </a>
  </div>

  <!-- Filter status -->
  <div class="status-filter">
    <button class="chip-status active" data-status="semua" onclick="filterPesanan('semua', this)">Semua</button>
    <button class="chip-status" data-status="menunggu" onclick="filterPesanan('menunggu', this)">Menunggu</button>
    <button class="chip-status" data-status="diproses" onclick="filterPesanan('diproses', this)">Diproses</button>
    <button class="chip-status" data-status="dikirim" onclick="filterPesanan('dikirim', this)">Dikirim</button>
    <button class="chip-status" data-status="selesai" onclick="filterPesanan('selesai', this)">Selesai</button>
  </div>

  <!-- Login required -->
  <div id="login-required" style="display:none" class="empty-state">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <h3>Masuk untuk Melihat Pesanan</h3>
    <p>Anda perlu login untuk melihat riwayat pesanan</p>
    <button class="btn-primary" onclick="Auth.loginWithGoogle()">Masuk dengan Google</button>
  </div>

  <!-- Orders list -->
  <div id="pesanan-list">
    <div class="loading-spinner-wrap"><div class="loading-spinner"></div></div>
  </div>
</main>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/realtime.js"></script>
<script>
  let allPesanan = [];
  let activeStatus = 'semua';

  async function loadPesanan() {
    if (!Auth.isLoggedIn()) {
      document.getElementById('login-required').style.display = 'flex';
      document.getElementById('pesanan-list').innerHTML = '';
      return;
    }

    document.getElementById('login-required').style.display = 'none';
    const container = document.getElementById('pesanan-list');
    container.innerHTML = '<div class="loading-spinner-wrap"><div class="loading-spinner"></div></div>';

    const { data, error } = await db
      .from('orders')
      .select(`*, order_items(*, products(nama, image_url)), addresses(penerima, nomor_hp, alamat)`)
      .eq('user_id', Auth.currentUser.id)
      .order('created_at', { ascending: false });

    if (error) {
      container.innerHTML = `<div class="empty-state"><p>Error memuat pesanan: ${error.message}</p></div>`;
      return;
    }

    allPesanan = data || [];
    renderPesanan();
  }

  function renderPesanan() {
    const container = document.getElementById('pesanan-list');
    let filtered = activeStatus === 'semua' ? allPesanan : allPesanan.filter(o => o.status === activeStatus);

    if (!filtered.length) {
      container.innerHTML = `
        <div class="empty-state">
          <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          <h3>Belum ada pesanan</h3>
          <p>${activeStatus === 'semua' ? 'Anda belum memiliki pesanan' : `Tidak ada pesanan dengan status "${Fmt.statusLabel(activeStatus)}"`}</p>
          <a href="produk.html" class="btn-primary">Mulai Belanja</a>
        </div>`;
      return;
    }

    container.innerHTML = filtered.map(order => {
      const items = order.order_items || [];
      const addr = order.addresses?.[0];
      const statusSteps = ['menunggu', 'diproses', 'dikirim', 'selesai'];
      const stepIdx = statusSteps.indexOf(order.status);

      return `
        <div class="pesanan-card" id="order-${order.id}">
          <div class="pesanan-header">
            <div class="order-meta">
              <span class="order-num">#${order.id.split('-')[0].toUpperCase()}</span>
              <span class="order-date">${Fmt.date(order.created_at)}</span>
            </div>
            <span class="status-badge ${Fmt.statusClass(order.status)}">${Fmt.statusLabel(order.status)}</span>
          </div>

          ${order.status !== 'dibatalkan' ? `
          <div class="status-tracker">
            ${statusSteps.map((s, i) => `
              <div class="tracker-step ${i <= stepIdx ? 'done' : ''} ${i === stepIdx ? 'current' : ''}">
                <div class="tracker-dot">
                  ${i <= stepIdx ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
                </div>
                <span>${Fmt.statusLabel(s)}</span>
              </div>
              ${i < statusSteps.length - 1 ? `<div class="tracker-line ${i < stepIdx ? 'done' : ''}"></div>` : ''}
            `).join('')}
          </div>` : ''}

          <div class="pesanan-items">
            ${items.map(i => `
              <div class="pesanan-item">
                <img src="${i.products?.image_url || `https://placehold.co/48x48/e8f5e9/2e7d32?text=${encodeURIComponent(i.nama_produk[0])}`}" 
                     alt="${i.nama_produk}" class="pesanan-item-img">
                <div class="pesanan-item-info">
                  <span>${i.nama_produk}</span>
                  <span class="pesanan-item-qty">${i.qty}x ${Fmt.currency(i.harga_satuan)}</span>
                </div>
                <span class="pesanan-item-sub">${Fmt.currency(i.subtotal)}</span>
              </div>
            `).join('')}
          </div>

          <div class="pesanan-footer">
            <div>
              <p class="footer-alamat">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${addr?.penerima || '-'} - ${addr?.alamat ? addr.alamat.slice(0, 40) + '...' : '-'}
              </p>
              <p class="footer-payment">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                Bayar COD saat diterima
              </p>
            </div>
            <div class="footer-total">
              <span>Total</span>
              <strong>${Fmt.currency(order.total)}</strong>
            </div>
          </div>

          ${order.status === 'menunggu' ? `
          <button class="btn-batal" onclick="batalPesanan('${order.id}')">
            Batalkan Pesanan
          </button>` : ''}
        </div>`;
    }).join('');
  }

  function filterPesanan(status, btn) {
    activeStatus = status;
    document.querySelectorAll('.chip-status').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPesanan();
  }

  async function batalPesanan(orderId) {
    Modal.confirm('Batalkan Pesanan', 'Yakin ingin membatalkan pesanan ini?', async () => {
      const { error } = await db.from('orders').update({ status: 'dibatalkan' }).eq('id', orderId);
      if (error) Toast.show('Gagal membatalkan: ' + error.message, 'error');
      else {
        Toast.show('Pesanan dibatalkan', 'info');
        loadPesanan();
      }
    });
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await Auth.init();
    await loadPesanan();

    // Show new order banner
    const params = new URLSearchParams(window.location.search);
    if (params.get('new')) {
      document.getElementById('new-order-banner').style.display = 'flex';
      setTimeout(() => document.getElementById('new-order-banner').style.display = 'none', 5000);
    }

    // Realtime updates
    if (Auth.isLoggedIn()) {
      Realtime.subscribeUserOrders(Auth.currentUser.id, (payload) => {
        const order = allPesanan.find(o => o.id === payload.new?.id);
        if (order && payload.new) {
          const oldStatus = order.status;
          order.status = payload.new.status;
          renderPesanan();
          if (payload.new.status !== oldStatus) {
            Toast.show(`Status pesanan diperbarui: ${Fmt.statusLabel(payload.new.status)}`, 'info', 5000);
          }
        } else {
          loadPesanan();
        }
      });
    }
  });

  db.auth.onAuthStateChange(() => setTimeout(loadPesanan, 500));
</script>
</body>
</html>
